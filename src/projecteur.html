<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projet PRÉSENCE - Flux Des Mots</title>
    <link rel="stylesheet" href="projecteur-style.css">
</head>
<body>

<canvas id="canvas"></canvas>

<div id="container">
    <div id="affichage" class="mot-affiche">Initialisation...</div>
</div>

<script>
    // Fond étoilé lent
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener("resize", resize);
    resize();

    const speed = 0.25; 
    class StarParticle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = 0; this.vy = 0;
            this.age = 0;
            this.maxAge = Math.random() * 400 + 200;
            this.color = Math.random() > 0.8 ? "#7dd3fc" : "#f0f9ff";
        }
        update(t) {
            let angle = (Math.sin(this.x * 0.0015 + t * 0.0003) + Math.cos(this.y * 0.0015 + t * 0.0002)) * Math.PI * 2;
            this.vx += Math.cos(angle) * 0.04; this.vy += Math.sin(angle) * 0.04;
            this.vx *= 0.98; this.vy *= 0.98;
            this.x += this.vx * speed; this.y += this.vy * speed;
            this.age++;
            if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.age > this.maxAge) this.init();
        }
        draw() {
            let opacity = Math.sin((this.age / this.maxAge) * Math.PI) * 0.3;
            ctx.fillStyle = this.color;
            ctx.globalAlpha = opacity;
            ctx.beginPath(); ctx.arc(this.x, this.y, 1.1, 0, Math.PI * 2); ctx.fill();
        }
    }
    for (let i = 0; i < 350; i++) particles.push(new StarParticle());
    function animate(t) {
        ctx.fillStyle = "rgba(0, 8, 20, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(t); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate(0);

    // Logique d'affichage
    class ProjecteurScene {
        constructor() {
            this.playlist = [{id: 0, texte: "PRÉSENCE"}];
            this.index = 0;
            this.validesActuels = new Set([0]); // IDs validés actuellement
            this.el = document.getElementById('affichage');
            this.isAnimating = false;
        }

        // Mélanger les mots de manière aléatoire (sauf le message courant)
        melangerMots() {
            if (this.playlist.length <= 2) return;
            
            // Extraire le message courant
            const msgCourant = this.playlist[this.index];
            
            // Créer une playlist sans le message courant
            const autreMsgs = this.playlist.filter((_, i) => i !== this.index);
            
            // Fisher-Yates shuffle
            for (let i = autreMsgs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [autreMsgs[i], autreMsgs[j]] = [autreMsgs[j], autreMsgs[i]];
            }
            
            // Reconstruire la playlist avec le message courant au début
            this.playlist = [msgCourant, ...autreMsgs];
            this.index = 0;
        }

        async fetchMessages() {
            try {
                const res = await fetch('/get_messages');
                const data = await res.json();
                
                const nouveauxValides = new Set();
                data.valides.forEach(msg => {
                    nouveauxValides.add(msg.id);
                });
                
                // Supprimer les messages qui ne sont plus valides
                this.playlist = this.playlist.filter(msg => {
                    if (msg.id === 0) return true; // Garder le message "PRÉSENCE"
                    return nouveauxValides.has(msg.id);
                });
                
                // Ajuster l'index si nécessaire
                if (this.index >= this.playlist.length) {
                    this.index = 0;
                }
                
                // Ajouter les nouveaux messages validés
                let nouveauxMessages = false;
                data.valides.forEach(msg => {
                    if (!this.validesActuels.has(msg.id)) {
                        this.playlist.push(msg);
                        this.validesActuels.add(msg.id);
                        nouveauxMessages = true;
                        console.log("Nouveau message :", msg.texte);
                    }
                });
                
                // Supprimer les IDs qui ne sont plus valides
                this.validesActuels = new Set([0, ...nouveauxValides]);
                
                // Mélanger la playlist si de nouveaux messages ont été ajoutés
                if (nouveauxMessages) {
                    this.melangerMots();
                }
            } catch (e) {
                console.error("Erreur lors de la récupération des messages:", e);
            }
        }

        ajusterTailleOptimale(texte) {
            const containerWidth = window.innerWidth * 0.9;
            const containerHeight = window.innerHeight * 0.7;
            
            let fontSize = 10;
            this.el.style.fontSize = fontSize + "px";
            
            while (this.el.offsetWidth < containerWidth && this.el.offsetHeight < containerHeight && fontSize < 300) {
                fontSize += 2;
                this.el.style.fontSize = fontSize + "px";
            }
            this.el.style.fontSize = (fontSize * 0.9) + "px";
        }

        async cycle() {
            if (this.playlist.length === 0 || this.isAnimating) return;
            this.isAnimating = true;

            // Sortie
            this.el.classList.remove('visible');
            await new Promise(r => setTimeout(r, 1300));

            // Passage au suivant
            this.index = (this.index + 1) % this.playlist.length;
            const msg = this.playlist[this.index];
            
            this.el.innerText = msg.texte;
            this.ajusterTailleOptimale(msg.texte);

            // Entrée
            this.el.classList.add('visible');
            
            // Affichage 4 secondes
            setTimeout(() => { this.isAnimating = false; }, 4000);
        }
    }

    const maScene = new ProjecteurScene();
    setInterval(() => maScene.fetchMessages(), 3000);
    setInterval(() => maScene.cycle(), 500);
</script>

</body>
</html>

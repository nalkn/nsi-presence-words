<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projet PRÉSENCE - Flux Des Mots</title>
    <link rel="stylesheet" href="projecteur-style.css">
</head>
<body>

<canvas id="canvas"></canvas>

<div id="container">
    <div id="affichage" class="mot-affiche">Initialisation...</div>
</div>

<div id="qr-container">
    <img src="qr1.png" alt="QR Code 1" id="qr1" class="qr-code">
    <img src="qr2.png" alt="QR Code 2" id="qr2" class="qr-code">
</div>

<script>
    // --- 1. FOND ÉTOILÉ ---
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener("resize", resize);
    resize();

    const speed = 0.25; 
    class StarParticle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = 0; this.vy = 0;
            this.age = 0;
            this.maxAge = Math.random() * 400 + 200;
            this.color = Math.random() > 0.8 ? "#7dd3fc" : "#f0f9ff";
        }
        update(t) {
            let angle = (Math.sin(this.x * 0.0015 + t * 0.0003) + Math.cos(this.y * 0.0015 + t * 0.0002)) * Math.PI * 2;
            this.vx += Math.cos(angle) * 0.04; this.vy += Math.sin(angle) * 0.04;
            this.vx *= 0.98; this.vy *= 0.98;
            this.x += this.vx * speed; this.y += this.vy * speed;
            this.age++;
            if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.age > this.maxAge) this.init();
        }
        draw() {
            let opacity = Math.sin((this.age / this.maxAge) * Math.PI) * 0.3;
            ctx.fillStyle = this.color;
            ctx.globalAlpha = opacity;
            ctx.beginPath(); ctx.arc(this.x, this.y, 1.1, 0, Math.PI * 2); ctx.fill();
        }
    }
    for (let i = 0; i < 350; i++) particles.push(new StarParticle());
    function animate(t) {
        ctx.fillStyle = "rgba(0, 8, 20, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(t); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate(0);

    // --- 2. LOGIQUE DU PROJECTEUR (MOTS) ---
    class ProjecteurScene {
        constructor() {
            this.playlist = [{id: 0, texte: "PRÉSENCE"}];
            this.index = 0;
            this.idsConnus = new Set([0]);
            this.el = document.getElementById('affichage');
            this.isAnimating = false;
        }

        async fetchMessages() {
            try {
                const res = await fetch('/get_messages');
                const data = await res.json();
                
                const idsServeur = new Set(data.valides.map(msg => msg.id));
                // Supprime ce qui n'est plus validé
                this.playlist = this.playlist.filter(msg => msg.id === 0 || idsServeur.has(msg.id));
                this.idsConnus = new Set(this.playlist.map(msg => msg.id));

                // Ajoute les nouveaux
                data.valides.forEach(msg => {
                    if (!this.idsConnus.has(msg.id)) {
                        this.playlist.splice(this.index + 1, 0, msg);
                        this.idsConnus.add(msg.id);
                    }
                });

                if (this.index >= this.playlist.length) this.index = 0;
            } catch (e) { console.error("Erreur synchro :", e); }
        }

        ajusterTailleOptimale(texte) {
            const containerWidth = window.innerWidth * 0.9;
            const containerHeight = window.innerHeight * 0.7;
            let fontSize = 10;
            this.el.style.fontSize = fontSize + "px";
            while (this.el.offsetWidth < containerWidth && this.el.offsetHeight < containerHeight && fontSize < 300) {
                fontSize += 2;
                this.el.style.fontSize = fontSize + "px";
            }
            this.el.style.fontSize = (fontSize * 0.9) + "px";
        }

        async cycle() {
            if (this.playlist.length === 0 || this.isAnimating) return;
            this.isAnimating = true;
            this.el.classList.remove('visible');
            await new Promise(r => setTimeout(r, 1300));
            this.index = (this.index + 1) % this.playlist.length;
            const msg = this.playlist[this.index];
            this.el.innerText = msg.texte;
            this.ajusterTailleOptimale(msg.texte);
            this.el.classList.add('visible');
            setTimeout(() => { this.isAnimating = false; }, 4000);
        }
    }

    const maScene = new ProjecteurScene();
    setInterval(() => maScene.fetchMessages(), 3000);
    setInterval(() => maScene.cycle(), 500);

    // --- 3. LOGIQUE QR CODES (CLIC + FLÈCHES) ---
    const qr1 = document.getElementById('qr1');
    const qr2 = document.getElementById('qr2');
    let qrState = 0; // 0: Off, 1: QR1, 2: QR2
    let qrSize = 150; 

    function appliquerTaille() {
        [qr1, qr2].forEach(img => {
            img.style.width = qrSize + "px";
            img.style.height = qrSize + "px";
        });
    }

    // Changement de QR au clic
    document.addEventListener('click', () => {
        qrState = (qrState + 1) % 3;
        qr1.classList.remove('visible');
        qr2.classList.remove('visible');
        if (qrState === 1) qr1.classList.add('visible');
        else if (qrState === 2) qr2.classList.add('visible');
    });

    // Ajustement taille avec Flèches
    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowUp") {
            qrSize += 10;
            appliquerTaille();
        } else if (e.key === "ArrowDown") {
            if (qrSize > 50) {
                qrSize -= 10;
                appliquerTaille();
            }
        }
    });

    // Initialisation taille
    appliquerTaille();

</script>
</body>
</html>
